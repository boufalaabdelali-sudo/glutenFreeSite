<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Commerce — Commande</title>
    <meta id="br-meta-desc" name="description" content="" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header id="br-hero" class="hero">
      <nav class="container nav">
        <div class="logo logo--brand">
          <img id="br-logo" class="nav-logo hidden" src="" alt="" width="120" height="40" />
          <span id="br-site-name">Votre commerce</span>
        </div>
        <div class="nav-actions">
          <a id="br-nav-command" class="btn btn-light" href="#commande">Commander</a>
          <a id="br-nav-admin" class="btn btn-outline" href="./admin.html">Admin</a>
        </div>
      </nav>
      <section class="container hero-content">
        <p id="br-hero-badge" class="badge"> </p>
        <h1 id="br-hero-title"> </h1>
        <p id="br-hero-lead" class="lead"> </p>
        <img id="br-hero-image" class="hero-visual hidden" src="" alt="" />
      </section>
    </header>

    <main>
      <section id="menu" class="container section">
        <h2 id="br-menu-title">Notre offre</h2>
        <p id="menu-loading">Chargement...</p>
        <p id="menu-empty" class="hidden section-intro"> </p>
        <div id="menu-grid" class="menu-grid"></div>
      </section>

      <section id="commande" class="container section">
        <h2 id="br-order-title">Commande</h2>
        <p id="order-blocked" class="section-intro hidden"> </p>
        <form id="order-form" class="order-form hidden">
          <div class="grid">
            <label>
              Nom complet
              <input type="text" name="name" required />
            </label>
            <label>
              Telephone
              <input type="tel" name="phone" placeholder="+33 6 00 00 00 00" required />
            </label>
            <label>
              Email
              <input type="email" name="email" required />
            </label>
            <label>
              Adresse de livraison
              <input type="text" name="address" required />
            </label>
          </div>

          <fieldset>
            <legend id="br-fieldset-legend">Selection</legend>
            <div id="order-lines"></div>
          </fieldset>

          <div class="grid">
            <label>
              Mode de paiement
              <select name="paymentMethod" required>
                <option value="livraison">Paiement a la livraison</option>
                <option value="enligne">Paiement en ligne</option>
              </select>
            </label>
            <label>
              Date souhaitee
              <input type="date" name="deliveryDate" required />
            </label>
          </div>

          <label>
            Remarques
            <textarea id="br-notes" name="notes" rows="3" placeholder=""></textarea>
          </label>

          <div class="order-footer">
            <p id="total" class="total">Total: 0,00</p>
            <button class="btn btn-primary" type="submit" id="submit-order">Valider</button>
          </div>
        </form>

        <div id="confirmation" class="confirmation hidden" aria-live="polite"></div>
      </section>

      <section id="suivi" class="container section">
        <h2>Suivi de commande</h2>
        <p class="section-intro">Entrez votre email pour voir l'etat de vos commandes.</p>
        <form id="track-form" class="order-form">
          <div class="grid">
            <label>
              Email
              <input type="email" name="email" required placeholder="votre@email.com" />
            </label>
          </div>
          <div class="order-footer">
            <button class="btn btn-primary" type="submit" id="track-submit">Rechercher mes commandes</button>
          </div>
        </form>
        <div id="track-error" class="admin-error hidden" aria-live="polite"></div>
        <div id="track-results" class="track-results hidden"></div>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        <p id="br-footer"> </p>
      </div>
    </footer>

    <div id="product-modal" class="product-modal hidden" role="dialog" aria-modal="true" aria-labelledby="product-modal-title">
      <div id="product-modal-backdrop" class="product-modal-backdrop"></div>
      <div class="product-modal-content">
        <button id="product-modal-close" class="product-modal-close" type="button" aria-label="Fermer">×</button>
        <img id="product-modal-image" class="product-modal-image hidden" alt="" />
        <h3 id="product-modal-title"></h3>
        <p id="product-modal-desc" class="product-modal-desc"></p>
        <p id="product-modal-price" class="product-modal-price"></p>
        <label class="product-modal-qty">
          Quantité souhaitée
          <input id="product-modal-qty" type="number" min="1" max="20" step="1" value="1" />
        </label>
        <div class="product-modal-actions">
          <span id="product-modal-feedback" class="product-modal-feedback hidden" aria-live="polite">Ajouté au panier</span>
          <button id="product-modal-add" class="btn btn-primary" type="button">Ajouter au panier</button>
        </div>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
